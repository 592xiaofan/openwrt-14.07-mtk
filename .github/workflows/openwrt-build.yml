name: Build OpenWrt 14.07-mtk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
      - name: Get current time
        id: date
        run: |
          echo "now=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Matt927/openwrt-14.07-mtk
          path: openwrt
          fetch-depth: 1

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            subversion \
            libncurses5-dev \
            zlib1g-dev \
            gawk \
            gcc-multilib \
            flex \
            git-core \
            gettext \
            libssl-dev \
            unzip \
            python2.7 \
            python2.7-dev \
            libelf-dev \
            rsync \
            time \
            file

      - name: 配置编译环境
        run: |
          sudo ln -sf /usr/bin/python2.7 /usr/local/bin/python
          sudo ln -sf /usr/bin/python2.7 /usr/local/bin/python2
          python --version
          cd openwrt

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置文件
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_rt305x=y
          CONFIG_TARGET_OPTIONS=y
          CONFIG_TARGET_OPTIONS_BAUDRATE_115200=y
          CONFIG_KERNEL_EARLY_PRINTK=y
          CONFIG_KERNEL_CMDLINE_OVERRIDE=y
          CONFIG_KERNEL_BRIDGE=y
          CONFIG_KERNEL_VLAN_8021Q=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_iptables-mod-nat=y
          CONFIG_PACKAGE_kmod-rt2800-soc=y
          CONFIG_PACKAGE_kmod-rt2x00-lib=y
          CONFIG_PACKAGE_kmod-rt2800-lib=y
          CONFIG_PACKAGE_wpad-mini=y
          CONFIG_PACKAGE_hostapd-mini=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-sdio=y
          CONFIG_PACKAGE_kmod-mmc=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-sched=y
          CONFIG_PACKAGE_luci-app-qos=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-wireless=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_ipv6=n
          CONFIG_PACKAGE_kmod-ipv6=n
          CONFIG_PACKAGE_samba36=n
          CONFIG_PACKAGE_miniupnpd=n
          CONFIG_DEVEL=n
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_INITRAMFS=y
          EOF
          
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download V=s

      - name: 编译固件
        id: build
        run: |
          cd openwrt
          CPUS=$(nproc)
          [ $CPUS -gt 4 ] && CPUS=4
          make -j$CPUS V=s 2>&1 | tee build.log
          
          if [ -f bin/ramips/openwrt-ramips-rt305x-squashfs-sysupgrade.bin ] || \
             [ -n "$(find bin/ -name '*.bin' -o -name '*.trx' | head -1)" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: 收集固件
        if: always()
        run: |
          cd openwrt
          mkdir -p ${{ github.workspace }}/firmware
          find bin/ -type f \( -name "*.bin" -o -name "*.trx" -o -name "*.img" -o -name "*squashfs*" -o -name "*sysupgrade*" -o -name "*factory*" \) -exec cp -v {} ${{ github.workspace }}/firmware/ \;
          cp -rf bin/ ${{ github.workspace }}/firmware-full/ 2>/dev/null || true
          cp .config ${{ github.workspace }}/firmware/config.txt 2>/dev/null || true
          cp build.log ${{ github.workspace }}/firmware/build.log 2>/dev/null || true

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-14.07-mtk-firmware-${{ steps.date.outputs.now }}
          path: |
            firmware/
            firmware-full/
          retention-days: 30
          if-no-files-found: warn

      - name: 上传构建日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ steps.date.outputs.now }}
          path: |
            openwrt/build.log
            openwrt/dl/
            openwrt/.config
          retention-days: 7

      - name: Create release
        if: steps.build.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        with:
          name: OpenWrt 14.07-mtk Build ${{ steps.date.outputs.now }}
          tag_name: build-${{ steps.date.outputs.now }}
          body: |
            OpenWrt 14.07-mtk 固件自动构建
            
            构建时间: ${{ steps.date.outputs.date }}
            
            ## 包含的组件
            - 目标平台: ramips/rt305x
            - 串口波特率: 115200
            - Luci Web 界面
            - QoS 流量控制
            - DDNS 动态域名
            - USB 存储支持
            - SD/MMC 卡支持
            - Tun/VPN 支持
            
            ## 固件文件
            - sysupgrade.bin: 用于升级的固件
            - factory.bin: 用于初始刷机的固件
            
            请根据您的设备型号选择合适的固件。
          files: |
            firmware/*.bin
            firmware/*.trx
            firmware/*.img
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
