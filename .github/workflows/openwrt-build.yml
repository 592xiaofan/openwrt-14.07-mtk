name: Build OpenWrt 23.05 for MT7688 (Official SDK)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * 0'  # 每周日自动构建（可选）

env:
  OPENWRT_VERSION: 23.05.5
  TARGET: ramips/mt76x8
  SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt76x8/openwrt-sdk-23.05.5-ramips-mt76x8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
  # 官方SDK地址 [citation:1]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
      - name: 最大程度优化磁盘空间 (Maximize Build Space)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: 安装构建依赖 (Install Dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget subversion
          sudo apt-get autoremove -y
          sudo apt-get clean

      - name: 下载并解压官方SDK (Download Official SDK)
        run: |
          echo "SDK下载地址: ${{ env.SDK_URL }}"
          wget -q --show-progress --progress=bar:force:noscroll ${{ env.SDK_URL }}
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt
          cd openwrt
          echo "SDK路径: ${{ github.workspace }}/openwrt" >> $GITHUB_ENV
          pwd

      - name: 记录SDK信息 (Record SDK Info for Future Driver Compilation)
        run: |
          echo "==================== SDK 信息 ===================="
          echo "SDK下载地址: ${{ env.SDK_URL }}"
          echo "工具链路径: ${{ github.workspace }}/openwrt/staging_dir/toolchain-mipsel_24kc_gcc-12.3.0_musl"
          echo "内核头文件路径: ${{ github.workspace }}/openwrt/build_dir/target-mipsel_24kc_musl/linux-ramips_mt76x8/linux-5.15.162"
          echo "编译器前缀: mipsel-openwrt-linux-"
          echo "=================================================="
          echo "SDK_INFO=${{ env.SDK_URL }}" >> $GITHUB_ENV

      - name: 更新 Feeds (Update Feeds)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置文件 (Generate .config)
        run: |
          cd openwrt
          # 选择目标平台和设备 [citation:2]
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt76x8=y" >> .config
          echo "CONFIG_TARGET_ramips_mt76x8_DEVICE_hiwifi_hc5661a=y" >> .config
          
          # 设置串口波特率为115200 [citation:5]
          echo "CONFIG_TARGET_OPTIONS=y" >> .config
          echo "CONFIG_TARGET_OPTIONS_BAUDRATE_115200=y" >> .config
          
          # 内核符号导出（确保ko模块能加载） [基于历史分析]
          echo "CONFIG_KERNEL_KALLSYMS=y" >> .config
          echo "CONFIG_KERNEL_KALLSYMS_ALL=y" >> .config
          echo "CONFIG_KERNEL_MODVERSIONS=y" >> .config
          
          # 硬件配置：32M Flash / 128M RAM [根据用户要求]
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=16" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=120" >> .config
          
          # 集成常用软件包 [基于用户要求]
          echo "CONFIG_PACKAGE_ddns-scripts=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qos=y" >> .config
          echo "CONFIG_PACKAGE_v2raya=y" >> .config
          echo "CONFIG_PACKAGE_vsftpd=y" >> .config  # FTP服务器
          echo "CONFIG_PACKAGE_luci-app-vsftpd=y" >> .config
          
          # 确保LuCI界面完整
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          
          # 扩展软件包（可选，可根据需要增删）
          echo "CONFIG_PACKAGE_openssh-sftp-server=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          
          # 生成完整配置
          make defconfig
          
          # 打印最终配置以供检查
          ./scripts/diffconfig.sh

      - name: 下载源码包 (Download Source Packages)
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: 编译固件 (Compile Firmware)
        id: build
        run: |
          cd openwrt
          # 使用-j参数并行编译，提高速度
          make -j$(nproc) || make -j1 V=s
          
          # 查找生成的固件文件
          echo "========== 生成的固件文件 =========="
          find bin/targets/ -name "*squashfs*" -o -name "*sysupgrade*" -o -name "*factory*" | while read line; do
            echo "找到固件: $line"
            ls -lh $line
          done
          
          # 记录固件路径用于后续上传
          echo "firmware_path=$(find bin/targets/ -name "*sysupgrade*" | head -1)" >> $GITHUB_OUTPUT

      - name: 准备固件上传 (Prepare Firmware Upload)
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/firmware_output
          cp -rf openwrt/bin/targets/* ${{ github.workspace }}/firmware_output/ || true
          cp openwrt/.config ${{ github.workspace }}/firmware_output/config.txt
          echo "固件已复制到 firmware_output 目录"

      - name: 上传固件 (Upload Firmware Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-23.05-mt7688-firmware
          path: |
            firmware_output/
          retention-days: 30
          if-no-files-found: warn

      - name: 上传SDK信息 (Upload SDK Info for Future Use)
        uses: actions/upload-artifact@v4
        with:
          name: sdk-info
          path: |
            ${{ github.workspace }}/sdk_info.txt
          retention-days: 90
        run: |
          echo "SDK Download URL: ${{ env.SDK_URL }}" > ${{ github.workspace }}/sdk_info.txt
          echo "Toolchain Path: ${{ github.workspace }}/openwrt/staging_dir/toolchain-mipsel_24kc_gcc-12.3.0_musl" >> ${{ github.workspace }}/sdk_info.txt
          echo "Kernel Headers: ${{ github.workspace }}/openwrt/build_dir/target-mipsel_24kc_musl/linux-ramips_mt76x8/linux-5.15.162" >> ${{ github.workspace }}/sdk_info.txt

      - name: 上传构建日志 (Upload Build Logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt/logs/
            openwrt/build_dir/**/*.log
          retention-days: 7
