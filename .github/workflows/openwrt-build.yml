name: Build OpenWrt 14.07-mtk

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest  # 使用GitHub托管的Ubuntu最新版
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        path: openwrt-14.07-mtk  # 源码检出到指定目录

    - name: Build OpenWrt in Ubuntu 14.04 container
      run: |
        # 启动Ubuntu 14.04容器，挂载源码目录，修复源并编译
        docker run -e TZ=Asia/Shanghai \
          -v ${{ github.workspace }}/openwrt-14.07-mtk:/openwrt \
          --name openwrt-build ubuntu:14.04 /bin/bash -c "
            # 核心修复：替换为Ubuntu 14.04专属归档源
            echo 'deb http://old-releases.ubuntu.com/ubuntu-archive/ trusty main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://old-releases.ubuntu.com/ubuntu-archive/ trusty-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://old-releases.ubuntu.com/ubuntu-archive/ trusty-backports main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://old-releases.ubuntu.com/ubuntu-archive/ trusty-security main restricted universe multiverse' >> /etc/apt/sources.list
            
            # 更新源（失败后重试一次）
            apt-get update -y || apt-get update -y
            
            # 安装OpenWrt 14.07编译依赖（根据实际需求调整）
            apt-get install -y --no-install-recommends \
              build-essential subversion libncurses5-dev zlib1g-dev \
              gawk gcc-multilib flex git-core gettext libssl-dev unzip \
              wget curl python2.7 sudo
            
            # 进入源码目录，执行编译流程
            cd /openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install -a
            make defconfig  # 生成默认配置
            make -j$(nproc) V=s  # 多核编译（nproc自动识别核心数）
          "

    - name: Copy build artifacts
      run: |
        # 从容器中复制编译产物到宿主目录
        docker cp openwrt-build:/openwrt/bin ${{ github.workspace }}/openwrt-bin
        # 清理容器
        docker rm -f openwrt-build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-14.07-mtk-bin
        path: ${{ github.workspace }}/openwrt-bin

    - name: Create GitHub Release (optional)
      if: github.ref == 'refs/heads/main'  # 仅主分支触发
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/openwrt-bin/**/*
        tag_name: build-${{ github.run_id }}
        name: OpenWrt 14.07-mtk Build ${{ github.run_id }}
        body: |
          Automated build from GitHub Actions
          Runner: ${{ runner.os }} ${{ runner.version }}
          Build ID: ${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
