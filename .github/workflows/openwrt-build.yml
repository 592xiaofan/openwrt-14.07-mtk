name: Build OpenWrt 14.07-mtk

# 触发方式：仅手动触发（避免误操作）
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建Release

    steps:
      # 步骤1：拉取代码仓库
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史

      # 步骤2：获取当前时间（用于Release命名）
      - name: Get current time
        id: date
        run: |
          echo "now=$(date +'%Y-%m-%d %H:%M:%S' --utc '+8 hours')" >> $GITHUB_OUTPUT

      # 步骤3：核心编译（改用Ubuntu 16.04容器，源稳定）
      - name: Build in Ubuntu 16.04 container
        run: |
          # 启动Ubuntu 16.04容器，同步时区+挂载源码
          docker run -e TZ=Asia/Shanghai -v ${{ github.workspace }}:/openwrt --name openwrt-build ubuntu:16.04 /bin/bash -c "
            # 替换Ubuntu 16.04官方源（稳定可用）
            echo 'deb http://archive.ubuntu.com/ubuntu/ xenial main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://archive.ubuntu.com/ubuntu/ xenial-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://archive.ubuntu.com/ubuntu/ xenial-security main restricted universe multiverse' >> /etc/apt/sources.list
            
            # 更新源+安装所有编译依赖（无版本冲突）
            apt-get update -y
            apt-get install -y --no-install-recommends \
              build-essential subversion libncurses5-dev zlib1g-dev \
              gawk gcc-multilib flex git-core gettext libssl-dev unzip \
              make gcc g++ wget curl python2.7
            
            # 进入源码目录执行编译
            cd /openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install -a
            make defconfig  # 生成默认配置
            make -j2 V=s    # 2核编译（适配GitHub资源，避免卡死）
            
            # 复制产物到挂载目录（容器外可访问）
            cp -r bin /openwrt/
          "

      # 步骤4：上传编译产物（临时保存30天）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-14.07-mtk-bin-${{ github.run_id }}
          path: ${{ github.workspace }}/bin/
          retention-days: 30

      # 步骤5：创建Release（永久保存产物）
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-14.07-mtk-${{ github.run_id }}
          name: OpenWrt 14.07-mtk 编译产物-${{ steps.date.outputs.now }}
          files: ${{ github.workspace }}/bin/**/*
          body: |
             编译环境：Ubuntu 16.04（规避14.04源失效）
             编译时间（UTC+8）：${{ steps.date.outputs.now }}
             运行ID：${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤6：清理容器（释放资源）
      - name: Clean up container
        if: always()
        run: |
          docker rm -f openwrt-build || true
