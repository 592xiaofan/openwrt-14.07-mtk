# 工作流名称
name: Build OpenWrt 23.05 for MT7688

# 触发条件：手动触发 + 每天0点
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点（北京时间8点）

env:
  REPO_URL: https://github.com/openwrt/openwrt
  OPENWRT_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai
  TARGET: ramips
  SUBTARGET: mt76x8
  ARTIFACT_DIR: ${{ github.workspace }}/artifacts

jobs:
  OpenWrt-MT7688:
    runs-on: ubuntu-latest
    # 设置权限，允许写入 Releases
    permissions:
      contents: write
      actions: write

    steps:
      # step 1. 切到当前仓库
      - name: Checkout
        uses: actions/checkout@v3

      # step 2. 清理空间和安装依赖
      - name: Space cleanup and install dependencies
        run: |
          sudo -E apt-get update -y
          sudo -E apt-get full-upgrade -y
          sudo -E apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
            python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get clean
          sudo timedatectl set-timezone "$TZ"
          echo "✅ Dependencies installed"

      # step 3. 克隆 OpenWrt 23.05 官方源码
      - name: Clone OpenWrt 23.05
        run: |
          git clone --branch $OPENWRT_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "✅ Cloned OpenWrt $OPENWRT_BRANCH"

      # step 4. 更新 feeds（使用 GitHub 源，避免网络问题）
      - name: Update feeds
        run: |
          cd openwrt
          
          # 使用 GitHub 镜像源，提高可靠性
          cat > feeds.conf << EOF
          src-git base https://github.com/openwrt/openwrt.git;$OPENWRT_BRANCH
          src-git packages https://github.com/openwrt/packages.git;$OPENWRT_BRANCH
          src-git luci https://github.com/openwrt/luci.git;$OPENWRT_BRANCH
          src-git routing https://github.com/openwrt-routing/packages.git;$OPENWRT_BRANCH
          src-git telephony https://github.com/openwrt/telephony.git;$OPENWRT_BRANCH
          EOF
          
          # 带重试的 feeds 更新
          for i in {1..5}; do
            ./scripts/feeds update -a && break
            if [ $i -eq 5 ]; then
              echo "❌ Feeds update failed after 5 attempts"
              exit 1
            fi
            echo "Retry feeds update $i/5..."
            sleep 15
          done
          
          ./scripts/feeds install -a
          echo "✅ Feeds updated and installed"

      # step 5. 生成配置文件（针对 MT7688，32M flash/128M 内存）
      - name: Generate config file
        run: |
          cd openwrt
          rm -f ./.config*
          touch ./.config

          # 写入编译配置（MT7688专用，包含所有你需要的功能）
          cat >> .config <<'EOF'

          # Target Configuration (MT7688)
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_mediatek_mt7628an-eval-board=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y

          # Kernel symbol export (你的核心要求)
          CONFIG_KERNEL_KALLSYMS=y
          CONFIG_KERNEL_KALLSYMS_ALL=y
          CONFIG_KERNEL_MODVERSIONS=y
          CONFIG_KERNEL_DEBUG_INFO=y

          # SDIO/MMC support (确保SDIO驱动正常加载)
          CONFIG_PACKAGE_kmod-mmc=y
          CONFIG_PACKAGE_kmod-mmc-spi=y
          CONFIG_PACKAGE_kmod-sdhci=y
          CONFIG_PACKAGE_kmod-sdhci-mt7620=y

          # USB support
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-extras=y

          # Wireless (MT7688内置WiFi)
          CONFIG_PACKAGE_kmod-mt76-core=y
          CONFIG_PACKAGE_kmod-mt76x2=y
          CONFIG_PACKAGE_kmod-mt7603=y
          CONFIG_PACKAGE_kmod-mt76x0e=y
          CONFIG_PACKAGE_hostapd-common=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y

          # DDNS
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts_aliyun=y
          CONFIG_PACKAGE_ddns-scripts_dnspod=y
          CONFIG_PACKAGE_luci-app-ddns=y

          # QoS
          CONFIG_PACKAGE_luci-app-qos=y
          CONFIG_PACKAGE_qos-scripts=y

          # V2Ray
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_v2ray-geoip=y
          CONFIG_PACKAGE_v2ray-geosite=y
          CONFIG_PACKAGE_luci-app-v2ray=y

          # FTP Server
          CONFIG_PACKAGE_vsftpd=y
          CONFIG_PACKAGE_luci-app-vsftpd=y

          # Luci (Web Interface)
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-mod-admin-full=y

          # Additional useful packages
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_openssh-sftp-server=y

          # Filesystem support
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_block-mount=y

          # IPv6 support
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_kmod-ip6tables=y
          CONFIG_PACKAGE_kmod-ipv6=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y

          # Flash size optimization (32M flash / 128M memory)
          CONFIG_TARGET_KERNEL_PARTSIZE=16
          CONFIG_TARGET_ROOTFS_PARTSIZE=256
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256

          # 串口波特率115200
          CONFIG_KERNEL_EARLY_PRINTK=y
          CONFIG_KERNEL_CMDLINE_OVERRIDE=y
          CONFIG_CMDLINE="console=ttyS0,115200"

          # 调试选项
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_CCACHE_DIR="/tmp/ccache"

          # Firmware Type (输出格式)
          CONFIG_TARGET_ROOTFS_TARGZ=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y

          EOF

          # 删除文件中每行的所有前导空格
          sed -i 's/^[ \t]*//g' ./.config
          
          # 生成完整配置
          make defconfig
          
          # 保存配置供后续使用
          cp .config ${{ github.workspace }}/config.txt
          echo "✅ Configuration generated"

      # step 6. 下载源代码（带重试）
      - name: Make download
        run: |
          cd openwrt
          
          # 带重试的下载，超时3600秒
          timeout 3600 make download -j8 || {
            echo "⚠️ Download interrupted, retrying with single thread..."
            make download -j1 V=s
          }
          
          echo "✅ Source download completed"

      # step 7. 编译固件
      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          
          # 设置并行编译，但避免内存溢出
          CPUS=$(nproc)
          if [ $CPUS -gt 4 ]; then
            CPUS=4
          fi
          
          echo "🚀 Starting compilation with $CPUS threads..."
          echo "Build started at: $(date)"
          
          # 编译固件（带详细日志）
          make -j$CPUS V=s 2>&1 | tee ${{ github.workspace }}/build.log
          
          # 检查编译结果
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Firmware built successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Build failed, check logs"
            exit 1
          fi
          
          echo "Build finished at: $(date)"

      # step 8. 收集固件
      - name: Collect firmware
        if: always()
        run: |
          # 创建固件收集目录
          mkdir -p ${{ github.workspace }}/firmware
          
          # 查找固件文件（OpenWrt 23.05 的输出路径）
          cd openwrt/bin/targets/$TARGET/$SUBTARGET
          
          # 查找并复制所有固件文件
          find . -type f \( \
            -name "*.bin" -o \
            -name "*.trx" -o \
            -name "*.img" -o \
            -name "*squashfs*" -o \
            -name "*sysupgrade*" -o \
            -name "*factory*" -o \
            -name "*.gz" \) \
            -exec cp -v {} ${{ github.workspace }}/firmware/ \;
          
          # 生成固件列表和校验和
          cd ${{ github.workspace }}/firmware
          ls -la > firmware_list.txt
          sha256sum * > sha256sums.txt 2>/dev/null || true
          
          # 显示找到的固件
          echo "📦 Firmware files found:"
          ls -la
          
          cd ${{ github.workspace }}

      # step 9. 创建 Release & 上传资源
      - name: Create Release and Upload Assets
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        with:
          name: OpenWrt 23.05 for MT7688 ${{ github.run_number }}
          tag_name: mt7688-${{ github.run_number }}
          body: |
            ## OpenWrt 23.05 固件 for MT7688
            
            **编译时间**: ${{ steps.date.outputs.date }}
            
            ### 固件特性
            - 内核版本: 5.15.x
            - 目标平台: ${{ env.TARGET }}/${{ env.SUBTARGET }}
            - 串口波特率: 115200
            - 内存: 128MB
            - Flash: 32MB
            
            ### 已集成功能
            - ✅ 内核符号导出 (KALLSYMS_ALL=y) - 方便编译第三方驱动
            - ✅ SDIO/MMC 支持 - 你的 TXW8301 驱动可用
            - ✅ DDNS 动态域名
            - ✅ QoS 流量控制
            - ✅ V2Ray 代理
            - ✅ FTP 服务器 (vsftpd)
            - ✅ Luci Web 界面
            - ✅ USB 存储支持
            
            ### 刷机说明
            1. 进入 U-Boot 或 OpenWrt 系统
            2. 刷写 `*-sysupgrade.bin` 文件
            3. 如果是从其他固件刷入，可能需要先刷 `*-factory.bin`
            
            ### SDK 信息（供后续编译驱动使用）
            ```
            OPENWRT_VERSION: ${{ env.OPENWRT_VERSION }}
            TARGET: ${{ env.TARGET }}
            SUBTARGET: ${{ env.SUBTARGET }}
            ```
            
            ### 文件校验
            请务必验证 SHA256 校验和后再刷机。
          files: |
            ${{ github.workspace }}/firmware/*.bin
            ${{ github.workspace }}/firmware/*.trx
            ${{ github.workspace }}/firmware/*.img
            ${{ github.workspace }}/firmware/*.gz
            ${{ github.workspace }}/config.txt
            ${{ github.workspace }}/build.log
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # step 10. 上传固件作为 artifact（即使 release 失败也能保存）
      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: openwrt-23.05-mt7688-firmware
          path: |
            ${{ github.workspace }}/firmware/
            ${{ github.workspace }}/config.txt
            ${{ github.workspace }}/build.log
          retention-days: 30

      # step 11. 获取时间（用于 release 标题）
      - name: Get current time
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
