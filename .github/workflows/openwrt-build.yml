name: Build OpenWrt 14.07-mtk

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current time
        id: date
        run: |
          echo "now=$(date +'%Y-%m-%d %H:%M:%S' --utc '+8 hours')" >> $GITHUB_OUTPUT

      # 核心编译步骤：解决SSL+依赖+root编译所有问题
      - name: Build in Ubuntu 16.04 container (fix all issues)
        run: |
          docker run -e TZ=Asia/Shanghai -v ${{ github.workspace }}:/openwrt --name openwrt-build ubuntu:16.04 /bin/bash -c "
            # ========== 1. 修复源+安装基础依赖 ==========
            echo 'deb http://archive.ubuntu.com/ubuntu/ xenial main restricted universe multiverse' > /etc/apt/sources.list
            echo 'deb http://archive.ubuntu.com/ubuntu/ xenial-updates main restricted universe multiverse' >> /etc/apt/sources.list
            echo 'deb http://archive.ubuntu.com/ubuntu/ xenial-security main restricted universe multiverse' >> /etc/apt/sources.list
            apt-get update -y
            # 安装所有依赖（含SSL证书、file、openssl）
            apt-get install -y --no-install-recommends \
              build-essential subversion libncurses5-dev zlib1g-dev \
              gawk gcc-multilib flex git-core gettext libssl-dev unzip \
              make gcc g++ wget curl python2.7 openssl file ca-certificates \
              bzip2 perl tar findutils libssl1.0.0

            # ========== 2. 修复SSL证书（核心解决feeds拉取失败） ==========
            update-ca-certificates -f  # 更新CA证书，解决git SSL验证问题
            # 强制git使用https时忽略证书（兜底方案）
            git config --global http.sslVerify false

            # ========== 3. 创建普通用户（解决root编译限制） ==========
            useradd -m openwrt && chown -R openwrt:openwrt /openwrt
            echo 'openwrt ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

            # ========== 4. 切换普通用户执行编译（关键！） ==========
            su - openwrt -c '
              cd /openwrt
              # 更新feeds（修复SSL后可正常拉取）
              ./scripts/feeds update -a || ./scripts/feeds update -a  # 失败重试
              ./scripts/feeds install -a
              # 生成配置+强制跳过部分严格检查（兼容旧版）
              make defconfig FORCE=1
              # 编译（单核心更稳定，避免资源不足）
              make -j1 V=s FORCE=1
            '

            # ========== 5. 复制产物到挂载目录（确保产物存在） ==========
            if [ -d "/openwrt/bin" ]; then
              cp -r /openwrt/bin /openwrt/
            else
              echo "编译产物目录不存在，创建空目录避免cp报错"
              mkdir -p /openwrt/bin
            fi
          "

      # 上传产物（无论是否成功都保留日志）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-14.07-mtk-bin-${{ github.run_id }}
          path: ${{ github.workspace }}/bin/
          retention-days: 30

      # 创建Release（仅编译成功时）
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-14.07-mtk-${{ github.run_id }}
          name: OpenWrt 14.07-mtk 编译产物-${{ steps.date.outputs.now }}
          files: ${{ github.workspace }}/bin/**/*
          body: |
            📌 编译环境：Ubuntu 16.04（修复SSL+root+依赖问题）
            🕒 编译时间（UTC+8）：${{ steps.date.outputs.now }}
            🆔 运行ID：${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 清理容器
      - name: Clean up container
        if: always()
        run: |
          docker rm -f openwrt-build || true
