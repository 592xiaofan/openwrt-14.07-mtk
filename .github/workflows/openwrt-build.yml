name: Build OpenWrt 14.07-mtk for MT7688 (基础固件)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # 每周日凌晨构建

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3小时超时限制
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.1.7
        with:
          path: openwrt
          fetch-depth: 1

      - name: Create ccache directory
        run: mkdir -p ${{ github.workspace }}/ccache

      - name: Set build environment
        run: |
          echo "BUILD_START_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_TIMESTAMP=$(date '+%s')" >> $GITHUB_ENV

      - name: Restore ccache (restore)
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - name: Build in Ubuntu 12.04 container
        id: build
        run: |
          docker run --name openwrt-build \
            -e TZ=Asia/Shanghai \
            -v ${{ github.workspace }}/openwrt:/openwrt \
            -v ${{ github.workspace }}/ccache:/ccache \
            ubuntu:12.04 /bin/bash -c "
            set -exo pipefail

            # 错误处理和日志
            trap 'echo "Build failed at line \$LINENO" | tee -a build.log' ERR

            # 更换为旧版本软件源
            sed -i 's/archive.ubuntu.com/old-releases.ubuntu.com/g' /etc/apt/sources.list
            apt-get update || apt-get update
            apt-get install -y build-essential subversion libncurses5-dev zlib1g-dev gawk gcc-multilib flex git-core gettext libssl-dev unzip python2.7 file wget curl ccache

            # 验证 GCC 版本 (应为 4.6.3)
            echo '=== GCC version ==='
            gcc --version | head -1

            # 配置 ccache
            export PATH=/usr/lib/ccache:\\\$PATH
            export CCACHE_DIR=/ccache
            ccache -M 10G
            ccache -z  # 重置统计信息

            cd /openwrt

            # 重写 feeds.conf，只保留必要的 feeds
            cat > feeds.conf << 'EOF_feeds'
            src-git packages https://github.com/openwrt/packages.git^0b0ec2fce2974e6f74a8de342957cba6e186d924
            src-git luci https://github.com/openwrt/luci.git^79cf66900e038f0d03376edc7033c385030a5222
            src-git routing https://github.com/openwrt-routing/packages.git^bb289e1f913f4509cb1a61d06f6eeb4c560adcec
            EOF_feeds

            # 更新 feeds
            ./scripts/feeds update -a

            # 只安装 luci 及相关包
            ./scripts/feeds install luci luci-app-qos luci-app-ddns ddns-scripts

            # 生成 .config 文件（针对 MT7688）
            cat > .config << 'EOF_config'
            CONFIG_TARGET_ramips=y
            CONFIG_TARGET_ramips_mt76x8=y
            CONFIG_TARGET_ramips_mt76x8_DEVICE_mt7688=y
            CONFIG_TARGET_OPTIONS=y
            CONFIG_TARGET_OPTIONS_BAUDRATE_115200=y
            CONFIG_KERNEL_BRIDGE=y
            CONFIG_KERNEL_VLAN_8021Q=y
            CONFIG_PACKAGE_dnsmasq=y
            CONFIG_PACKAGE_iptables=y
            CONFIG_PACKAGE_iptables-mod-nat=y
            CONFIG_PACKAGE_kmod-rt2800-soc=y
            CONFIG_PACKAGE_wpad-mini=y
            CONFIG_PACKAGE_hostapd-mini=y
            CONFIG_PACKAGE_kmod-usb-core=y
            CONFIG_PACKAGE_kmod-usb-ohci=y
            CONFIG_PACKAGE_kmod-usb-storage=y
            CONFIG_PACKAGE_kmod-usb2=y
            CONFIG_PACKAGE_kmod-sdio=y
            CONFIG_PACKAGE_kmod-mmc=y
            CONFIG_PACKAGE_kmod-tun=y
            CONFIG_PACKAGE_kmod-sched=y
            CONFIG_PACKAGE_luci-app-qos=y
            CONFIG_PACKAGE_ddns-scripts=y
            CONFIG_PACKAGE_luci-app-ddns=y
            CONFIG_PACKAGE_luci=y
            CONFIG_PACKAGE_luci-mod-admin-full=y
            CONFIG_TARGET_ROOTFS_SQUASHFS=y
            CONFIG_PACKAGE_ipv6=n
            CONFIG_PACKAGE_kmod-ipv6=n
            CONFIG_PACKAGE_samba36=n
            CONFIG_PACKAGE_miniupnpd=n
            EOF_config

            echo '========== .config =========='
            cat .config
            echo '=============================='

            make defconfig

            # 下载源码包（带重试机制）
            echo '========== Downloading packages =========='
            for i in {1..3}; do
              make download V=s && break || {
                if [ \\\$i -lt 3 ]; then
                  echo \"Download attempt \\\$i failed, retrying...\"
                  sleep 10
                else
                  echo \"Download failed after 3 attempts\"
                  exit 1
                fi
              }
            done
            echo '========== Download complete =========='

            # 编译
            echo '========== Starting build =========='
            CPUS=\\\$(nproc)
            [ \\\$CPUS -gt 4 ] && CPUS=4
            echo \"Using \\\$CPUS CPU cores\"
            make -j\\\$CPUS V=s 2>&1 | tee build.log

            # 检查固件是否生成
            if ! find bin/ -type f \\( -name '*.bin' -o -name '*.trx' \\) | grep -q .; then
                echo 'ERROR: No firmware files found!'
                exit 1
            fi

            echo '========== Firmware files =========='
            find bin/ -type f \\( -name '*.bin' -o -name '*.trx' \\) -exec ls -lh {} \\;
            echo '====================================='

            # ccache 统计信息
            echo '========== ccache statistics =========='
            ccache -s
            echo '======================================='
            "

      - name: Copy artifacts from container
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/firmware ${{ github.workspace }}/logs
          
          # 复制固件
          docker cp openwrt-build:/openwrt/bin/. ${{ github.workspace }}/firmware/ 2>/dev/null || {
            echo "Warning: Failed to copy firmware"
            mkdir -p ${{ github.workspace }}/firmware
          }
          
          # 复制日志文件
          docker cp openwrt-build:/openwrt/build.log ${{ github.workspace }}/logs/ 2>/dev/null || echo "Warning: Failed to copy build.log"
          docker cp openwrt-build:/openwrt/.config ${{ github.workspace }}/logs/config.txt 2>/dev/null || echo "Warning: Failed to copy .config"
          docker cp openwrt-build:/openwrt/feeds.conf ${{ github.workspace }}/logs/feeds.conf 2>/dev/null || echo "Warning: Failed to copy feeds.conf"
          
          # 修复权限
          sudo chown -R $USER:$USER ${{ github.workspace }}/firmware ${{ github.workspace }}/logs 2>/dev/null || true

      - name: Clean up Docker container
        if: always()
        run: |
          docker stop openwrt-build 2>/dev/null || true
          docker rm openwrt-build 2>/dev/null || true

      - name: Generate build summary
        if: always()
        run: |
          BUILD_END_TIME=$(date '+%Y-%m-%d %H:%M:%S')
          BUILD_DURATION=$(($(date '+%s') - ${{ env.BUILD_TIMESTAMP }}))
          
          echo "## 🔨 OpenWrt Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 开始时间 | ${{ env.BUILD_START_TIME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 结束时间 | $BUILD_END_TIME |" >> $GITHUB_STEP_SUMMARY
          echo "| 耗时 | $((BUILD_DURATION / 60)) 分 $((BUILD_DURATION % 60)) 秒 |" >> $GITHUB_STEP_SUMMARY
          echo "| 状态 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ccache 恢复 | ${{ steps.cache-restore.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 列出生成的固件
          if [ -d "${{ github.workspace }}/firmware" ] && [ -n "$(find ${{ github.workspace }}/firmware -type f 2>/dev/null)" ]; then
            echo "### 📦 固件文件" >> $GITHUB_STEP_SUMMARY
            find ${{ github.workspace }}/firmware -type f -exec ls -lh {} \; | awk '{print "- `" $9 "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "- 未找到固件文件" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ 未生成固件文件" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: openwrt-14.07-mt7688-basic
          path: firmware/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: build-logs
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Cache ccache (save)
        if: always()
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - name: Cleanup workspace
        if: always()
        run: |
          echo "Workspace size before cleanup:"
          du -sh ${{ github.workspace }}/* 2>/dev/null || true
          
          # 清理大型临时文件
          rm -rf ${{ github.workspace }}/openwrt/.git ${{ github.workspace }}/openwrt/build_dir 2>/dev/null || true
          
          echo "Workspace size after cleanup:"
          du -sh ${{ github.workspace }}/* 2>/dev/null || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Build failed! Check the logs for details."
          echo "Build Duration: $(($(date '+%s') - ${{ env.BUILD_TIMESTAMP }}) / 60) minutes"
