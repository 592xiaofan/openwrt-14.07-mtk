name: Build OpenWrt 14.07-mtk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get time
        id: date
        run: |
          echo "now=$(date +'%Y-%m-%d %H:%M:%S' --utc '+8 hours')" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          docker run -e TZ=Asia/Shanghai -v ${{ github.workspace }}:/openwrt --name openwrt-build ubuntu:16.04 /bin/bash -c "
            apt-get update > /dev/null
            apt-get install -y --no-install-recommends \
              build-essential subversion libncurses5-dev zlib1g-dev \
              gawk gcc-multilib flex git-core gettext libssl-dev unzip \
              make gcc g++ wget curl python2.7 openssl file ca-certificates \
              bzip2 perl tar findutils libssl1.0.0 sudo > /dev/null

            update-ca-certificates -f
            git config --global http.sslVerify false

            useradd -m openwrt
            chown -R openwrt:openwrt /openwrt
            echo 'openwrt ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

            su - openwrt -c '
              cd /openwrt
              
              # 创建配置文件
              cat > .config << \"EOF\"
              CONFIG_TARGET_ramips=y
              CONFIG_TARGET_ramips_rt305x=y
              CONFIG_CPU_MIPSR2_IRQ_VI=y
              CONFIG_KERNEL_BRIDGE=y
              CONFIG_KERNEL_VLAN_8021Q=y
              
              # 设置串口波特率为115200
              CONFIG_TARGET_ramips_rt305x_DEVICE_BAUDRATE=115200
              CONFIG_KERNEL_EARLY_PRINTK=y
              CONFIG_KERNEL_CMDLINE_OVERRIDE=y
              
              CONFIG_PACKAGE_dnsmasq=y
              CONFIG_PACKAGE_iptables=y
              CONFIG_PACKAGE_iptables-mod-nat=y
              
              CONFIG_PACKAGE_kmod-rt2800-soc=y
              CONFIG_PACKAGE_wpad-mini=y
              CONFIG_PACKAGE_hostapd-mini=y
              
              CONFIG_PACKAGE_kmod-usb-core=y
              CONFIG_PACKAGE_kmod-usb-ohci=y
              CONFIG_PACKAGE_kmod-usb-storage=y
              
              CONFIG_PACKAGE_kmod-sdio=y
              CONFIG_PACKAGE_kmod-mmc=y
              
              CONFIG_PACKAGE_kmod-tun=y
              
              CONFIG_PACKAGE_kmod-sched=y
              CONFIG_PACKAGE_luci-app-qos=y
              
              CONFIG_PACKAGE_ddns-scripts=y
              CONFIG_PACKAGE_luci-app-ddns=y
              
              CONFIG_PACKAGE_luci=y
              CONFIG_PACKAGE_luci-mod-admin-full=y
              CONFIG_PACKAGE_luci-mod-network=y
              CONFIG_PACKAGE_luci-mod-wireless=y
              
              # 禁用不需要的功能
              CONFIG_PACKAGE_ipv6=n
              CONFIG_PACKAGE_kmod-ipv6=n
              CONFIG_PACKAGE_samba36=n
              CONFIG_PACKAGE_miniupnpd=n
              CONFIG_DEVEL=n
              EOF

              # 显示配置以便调试
              echo \"========== .config content ==========\"
              cat .config
              echo \"=====================================\"

              ./scripts/feeds update -a
              ./scripts/feeds install -a

              make defconfig FORCE=1
              make -j\$(nproc) V=s FORCE=1
            '

            # 在容器内创建输出目录并复制文件
            mkdir -p /openwrt/output
            cp -rf /openwrt/bin/* /openwrt/output/ 2>/dev/null || true
            echo \"Files in output directory:\"
            ls -la /openwrt/output/ || echo \"No files found\"
          "

      - name: Copy artifacts from container
        run: |
          # 创建工作目录（使用 sudo 解决权限问题）
          sudo mkdir -p ${{ github.workspace }}/bin
          sudo chown -R $USER:$USER ${{ github.workspace }}/bin
          
          # 从容器复制文件
          docker cp openwrt-build:/openwrt/output/. ${{ github.workspace }}/bin/ || echo "No files copied from output"
          docker cp openwrt-build:/openwrt/bin/ramips ${{ github.workspace }}/bin/ 2>/dev/null || echo "No ramips files found"
          
          # 设置正确的权限
          sudo chown -R $USER:$USER ${{ github.workspace }}/bin
          
          # 显示找到的文件
          echo "=== Files in bin directory ==="
          find ${{ github.workspace }}/bin -type f -name "*.bin" -o -name "*.trx" -o -name "*.img" | head -20
          echo "================================"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-14.07-firmware
          path: |
            bin/**/*.bin
            bin/**/*.trx
            bin/**/*.img
            bin/**/openwrt-ramips-*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload full build output (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            bin/**/*
            logs/
          retention-days: 7
